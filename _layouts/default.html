<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
</head>
<body>
  <a class="skip-link" href="#main-content">Saltar al contenido</a>
  <div class="progress-bar-strip" id="globalProgressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <nav class="site-nav" aria-label="Navegacion principal">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-brand">☕ Java ICEQ</a>
      <button class="nav-toggle" id="navToggle" type="button" aria-label="Abrir menu" aria-controls="navLinks" aria-expanded="false">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="{{ '/' | relative_url }}">Inicio</a>
        <a href="{{ '/docs/lessons/' | relative_url }}">Lecciones</a>
        <a href="{{ '/playground/' | relative_url }}" class="nav-playground">▶ Playground</a>
        <a href="{{ '/docs/quick-start-student/' | relative_url }}">Modo Rápido</a>
        <a href="{{ '/docs/student-mission-map/' | relative_url }}">Misión</a>
        <button id="darkModeToggle" class="dark-toggle" type="button" aria-label="Activar modo oscuro" aria-pressed="false">🌙</button>
      </div>
    </div>
  </nav>

  <main class="main-content" id="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>Java Fundamentals Course ICEQ — UPC Responsabilidad Social Pre 2026</p>
      <p>Código: 1ASI0729</p>
      <p>
        <a href="https://github.com/JorgeVidVen/java-fundamentals-course-iceq" target="_blank" rel="noopener">GitHub</a>
        &middot;
        <a href="{{ '/course-plan/' | relative_url }}">Plan del curso</a>
        &middot;
        <a href="{{ '/contributing/' | relative_url }}">Contribuir</a>
      </p>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  {% if page.has_compiler %}
  <script src="https://www.jdoodle.com/assets/jdoodle-pym.min.js" type="text/javascript"></script>
  {% endif %}
</body>
</html>
