---
layout: default
---

<div class="lesson-container">
  <aside class="lesson-sidebar" id="lessonSidebar" aria-label="Lesson navigation">
    <nav class="sidebar-toc" aria-labelledby="tocTitle">
      <h3 id="tocTitle">On this page</h3>
      <ul id="tocList"></ul>
    </nav>
    <section class="sidebar-progress" aria-labelledby="progressTitle">
      <h3 id="progressTitle">Progreso</h3>
      <div class="mini-progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Course progress" id="miniProgressBar">
        <div class="mini-progress-fill" id="miniProgressFill" style="width: 0%"></div>
      </div>
      <span id="progressPercent">0%</span>
    </section>
    <div class="sidebar-nav">
      <a href="{{ '/docs/lessons/' | relative_url }}" class="btn btn-small">All lessons</a>
    </div>
  </aside>

  <article class="lesson-content">
    <div class="lesson-meta">
      <span class="lesson-badge" id="lessonBadge"></span>
      <span class="lesson-xp" id="lessonXP"></span>
    </div>

    <div id="lessonBody">
      {{ content }}
    </div>

    <div class="lesson-complete">
      <button class="btn btn-primary" id="markCompleteBtn" type="button">Marcar como completada</button>
    </div>
  </article>
</div>

<script src="{{ '/assets/js/lesson.js' | relative_url }}"></script>
