title: Java Fundamentals Course ICEQ
description: Curso introductorio de Java para estudiantes de secundaria
url: "https://java-fundamentals-course-iceq.vercel.app"
baseurl: ""
theme: null
markdown: kramdown
highlighter: rouge
permalink: pretty

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: "docs/lessons"
      type: "pages"
    values:
      layout: lesson
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

exclude:
  - README.md
  - scripts/
  - starter-files/
  - completed-examples/
  - vendor/
