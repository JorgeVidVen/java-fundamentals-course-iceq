name: Java course validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compile-lessons:
    name: Compile lesson folders
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Compile each lesson independently
        shell: bash
        run: |
          set -euo pipefail

          for root in starter-files completed-examples; do
            find "$root" -mindepth 1 -maxdepth 1 -type d | sort | while read -r lesson; do
              echo "::group::Compiling $lesson"

              if compgen -G "$lesson/*.java" > /dev/null; then
                javac "$lesson"/*.java
                find "$lesson" -name "*.class" -delete
              else
                echo "No Java files found in $lesson"
              fi

              echo "::endgroup::"
            done
          done

  build-site:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Install dependencies
        run: bundle install
      - name: Build site
        run: bundle exec jekyll build --strict_front_matter
        env:
          JEKYLL_ENV: production

      - name: Commit Gemfile.lock if changed
        run: |
          if git diff --exit-code Gemfile.lock; then
            echo "Gemfile.lock unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Gemfile.lock
            git commit -m "chore: update Gemfile.lock [skip ci]"
            git push
          fi
        shell: bash
